<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ - MusicShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">🎵 MusicShop</div>
        <nav>
            <a href="index.html">Trang chủ</a>
            <a href="products.html">Sản phẩm</a>
            <a href="about.html">Giới thiệu</a>
            <a href="contact.html">Liên hệ</a>
            <a href="cart.html">Giỏ hàng 🛒</a>
        </nav>
    </header>

    <section class="contact-hero">
        <h1>Liên hệ với chúng tôi</h1>
        <p>Gửi feedback hoặc câu hỏi, chúng tôi sẽ trả lời sớm nhất</p>
    </section>

    <section class="contact-form-section">
        <form id="contactForm" class="fade-in">
            <input type="text" placeholder="Họ và tên" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Nội dung" rows="5" required></textarea>
            <button type="submit" class="btn">Gửi</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 MusicShop. All rights reserved.</p>
    </footer>

    <script>
        const form = document.getElementById('contactForm');
        form.addEventListener('submit', function(e){
            e.preventDefault();
            alert("Cảm ơn bạn đã gửi phản hồi!");
            form.reset();
        });
    </script>
</body>
</html>
